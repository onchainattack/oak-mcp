name: CI

on:
  push:
    branches: [main]
  pull_request:

# Don't waste runner minutes on superseded pushes to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Skip the `prepare` script (which would call fetch-data → tsc) so CI
      # doesn't depend on onchainattack.org being reachable. The committed
      # data/embedded.json is enough for typecheck, and `npm test` builds
      # dist via its own `pretest: tsc` hook.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
