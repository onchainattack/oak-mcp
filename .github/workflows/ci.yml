name: CI

on:
  push:
    branches: [main]
  pull_request:

# Don't waste runner minutes on superseded pushes to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `prepare` runs `npm run build`, which calls `fetch-data` against
      # https://onchainattack.org. If that host is unavailable we fall back
      # to `--ignore-scripts` so CI can still verify typecheck + tests against
      # the bundled fixture (tests use OAK_DATA_PATH and don't need real data).
      # Uses `npm install` so this workflow works on branches both before and
      # after package-lock.json is committed.
      - name: Install dependencies
        run: npm install || npm install --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
