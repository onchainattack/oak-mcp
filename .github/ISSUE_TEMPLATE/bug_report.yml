name: Bug report
description: Something in oak-mcp doesn't behave as documented.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Before continuing**, double-check that this
        is a bug in the **MCP server** itself — not in the OAK content (use
        the upstream OAK repo for content issues — see the link above).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: oak_search returns [] for the query "X" even though OAK-T9.005 has it in its body.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Exact tool name, arguments, and the response you got. Use the JSON-RPC
        framing if you have it; otherwise the equivalent natural-language
        prompt the agent issued is fine.
      render: json
      placeholder: |
        {
          "name": "oak_search",
          "arguments": { "query": "rugpull" }
        }
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: oak-mcp version
      placeholder: e.g. 0.1.0 (see `oak_dataset_info` or `npm ls @onchainattack/oak-mcp`)
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. v20.18.0
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: e.g. Claude Desktop 1.x, Cursor 0.x, Cline, Zed, custom

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, related issues, workarounds you tried.
