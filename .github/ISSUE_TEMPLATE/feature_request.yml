name: Feature request
description: New tool, schema change, MCP capability, or other enhancement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for changes to the **MCP server**: a new tool, a new MCP
        capability (`resources`, `prompts`), a schema improvement, etc.

        Requests to **add new content** to the OAK corpus belong in the
        upstream OAK repo.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user / agent workflow that's currently awkward or impossible.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        Concrete shape of the change. For a new tool, propose a name,
        `inputSchema`, and an example response. For a schema change, show
        the current vs. proposed shape.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you weighed and why you discarded them.

  - type: dropdown
    id: breaking
    attributes:
      label: Is this a breaking change for existing tool consumers?
      options:
        - "No"
        - "Yes — existing arg shapes / response shapes change"
        - "Not sure"
    validations:
      required: true
