version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    groups:
      typescript-toolchain:
        patterns:
          - "typescript"
          - "tsx"
          - "@types/node"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
    ignore:
      # @modelcontextprotocol/sdk is the only runtime dep — bumps need
      # human review for protocol-version compatibility, so let Dependabot
      # surface them but expect manual handling.
      - dependency-name: "@modelcontextprotocol/sdk"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
